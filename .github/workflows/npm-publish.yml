name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          release_tag="${{ github.event.release.tag_name }}"
          release_tag="${release_tag:-${GITHUB_REF##*/}}"
          version="${release_tag#v}"

          if [[ "${{ github.event.release.prerelease }}" == "true" || "$version" == *"-"* ]]; then
            echo "npm_tag=next" >>"$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >>"$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish @phantompane/cli
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_ALWAYS_AUTH: true
        run: pnpm -r publish --access public --provenance --no-git-checks --tag ${{ steps.dist_tag.outputs.npm_tag }}

      - name: Publish @aku11i/phantom (backward compatibility)
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_ALWAYS_AUTH: true
        run: |
          cd packages/cli/dist
          sed -i 's/"name": "@phantompane\/cli"/"name": "@aku11i\/phantom"/' package.json
          npm publish --access public --provenance --tag ${{ steps.dist_tag.outputs.npm_tag }}
